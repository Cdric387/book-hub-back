# ================================
# Configuration generale
# ================================
spring.application.name=book-hub-back
server.port=8080

# ================================
# Base de donnees SQL Server
# ================================
# Remplace 'localhost' par ton serveur, 'BookHub' par le nom de ta base
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=BookHub;encrypt=false;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=Pa$$w0rd
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ================================
# JPA / Hibernate
# ================================
# 'update' = cree/modifie les tables automatiquement (pratique en dev)
# En production, utiliser 'validate' ou Flyway
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect

# ================================
# JWT
# ================================
# Secret de 256 bits minimum (change cette valeur !)
jwt.secret=BookHubSecretKeyPourSignerLesTokensJWT2024MinimumSixteenBytes256bits
jwt.expiration=86400000

# ================================
# Swagger
# ================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ================================
# Logs
# ================================
logging.level.com.bookhub=DEBUG
logging.level.org.springframework.security=DEBUG
